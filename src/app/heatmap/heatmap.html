<div class="w-full bg-white relative group">
  @if (tabTitle()) {
    <div class="px-2 py-1 bg-indigo-50 border-b border-indigo-100 mb-2">
      <span class="text-[10px] font-bold text-indigo-600 uppercase tracking-widest">{{ tabTitle() }}</span>
    </div>
  }
  <div 
    class="absolute right-4 z-[110] flex flex-col gap-2 opacity-0 group-hover:opacity-100 transition-opacity duration-300"
    [style.top.px]="toolbarOffset()"
  >
    <div class="bg-white/95 backdrop-blur-md border border-gray-200 rounded-lg shadow-xl p-2 flex flex-col gap-2 min-w-[80px]">
      <!-- Zoom Controls -->
      <div class="flex flex-col gap-1">
        <span class="text-[7px] font-black text-gray-400 uppercase text-center tracking-tighter">View</span>
        <div class="flex gap-1 justify-center">
          <button (click)="zoomIn()" title="Zoom In" class="p-1 hover:bg-indigo-50 text-gray-600 hover:text-indigo-600 rounded transition-colors border border-transparent hover:border-indigo-100">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v6m3-3H7"/></svg>
          </button>
          <button (click)="zoomOut()" title="Zoom Out" class="p-1 hover:bg-indigo-50 text-gray-600 hover:text-indigo-600 rounded transition-colors border border-transparent hover:border-indigo-100">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM13 10H7"/></svg>
          </button>
        </div>
        <div class="flex gap-1 justify-center">
          <button (click)="resetZoom()" title="Reset View" class="p-1 hover:bg-indigo-50 text-gray-600 hover:text-indigo-600 rounded transition-colors border border-transparent hover:border-indigo-100">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
          </button>
          <button (click)="downloadSvg()" title="Download SVG" class="p-1 hover:bg-indigo-50 text-gray-600 hover:text-indigo-600 rounded transition-colors border border-transparent hover:border-indigo-100">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
          </button>
        </div>
      </div>

      <div class="h-px bg-gray-100 mx-1"></div>

      <!-- Export All -->
      <div class="flex flex-col gap-1">
        <span class="text-[7px] font-black text-gray-400 uppercase text-center tracking-tighter">Export All</span>
        <div class="flex gap-1 justify-center">
          <button (click)="exportRequested.emit({scope: 'all', format: 'csv'})" title="Export All as CSV" class="text-[8px] font-bold text-indigo-600 hover:bg-indigo-50 px-1.5 py-0.5 rounded border border-indigo-100 transition-colors uppercase">CSV</button>
          <button (click)="exportRequested.emit({scope: 'all', format: 'tsv'})" title="Export All as TSV" class="text-[8px] font-bold text-emerald-600 hover:bg-emerald-50 px-1.5 py-0.5 rounded border border-emerald-100 transition-colors uppercase">TSV</button>
        </div>
      </div>

      <!-- Export Selected -->
      <div class="flex flex-col gap-1">
        <span class="text-[7px] font-black text-indigo-400 uppercase text-center tracking-tighter">Highlighted Only</span>
        <div class="flex gap-1 justify-center">
          <button (click)="exportRequested.emit({scope: 'highlighted', format: 'csv'})" title="Export Highlighted as CSV" class="text-[8px] font-bold bg-indigo-600 text-white hover:bg-indigo-700 px-1.5 py-0.5 rounded transition-colors uppercase shadow-sm active:scale-95">CSV</button>
          <button (click)="exportRequested.emit({scope: 'highlighted', format: 'tsv'})" title="Export Highlighted as TSV" class="text-[8px] font-bold bg-emerald-600 text-white hover:bg-emerald-700 px-1.5 py-0.5 rounded transition-colors uppercase shadow-sm active:scale-95">TSV</button>
        </div>
      </div>
    </div>
  </div>
  <div
    #topScrollContainer
    [style.position]="isSticky() ? 'fixed' : 'relative'"
    [style.top]="isSticky() ? '0' : '0'"
    [style.width.px]="isSticky() ? stickyWidth() : null"
    [style.z-index]="isSticky() ? 100 : 10"
    [style.left.px]="isSticky() ? stickyLeft() : null"
    class="overflow-x-auto overflow-y-hidden bg-gray-100 border-b border-gray-200 top-scrollbar"
    style="height: 14px;"
    (scroll)="onTopScroll()"
  >
    <div [style.width.px]="graphData().layout.width" style="height: 1px;"></div>
  </div>
  <div
    #plotContainer
    class="w-full overflow-x-auto overflow-y-auto text-center main-plot-area"
    (scroll)="onMainScroll()"
  >
    <div class="inline-block" [style.width.px]="graphData().layout.width">
      @if (genes().length > 0 && projects().length > 0) {
        <plotly-plot
          [data]="graphData().data"
          [layout]="graphData().layout"
          [config]="graphConfig()"
          [revision]="revision()"
          [useResizeHandler]="true"
          [style]="{display: 'inline-block', width: graphData().layout.width + 'px', height: (graphData().layout.height || 600) + 'px'}"
          (hover)="onHover($event)"
          (unhover)="onUnhover()"
          (plotlyClick)="onClick($event)"
        ></plotly-plot>
      } @else {
        <div class="flex flex-col justify-center items-center h-[400px] text-gray-400">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2-0 00-2-2H5a2 2-0 00-2 2v6a2 2(0 002 2h2a2 2-0 002-2m0 0V5a2 2-0 012-2h2a2 2-0 012 2v10m-6 0a2 2(0 002 2h2a2 2-0 002-2m0 0V5a2 2-0 012-2h2a2 2-0 012 2v14a2 2-0 01-2 2h-2a2 2-0 01-2-2z" />
          </svg>
          <span>No data available for the current selection.</span>
        </div>
      }
    </div>
  </div>
</div>
